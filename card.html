<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #F1F5F9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.25rem; font-family: 'DM Sans', sans-serif; }
  .card { width: 100%; max-width: 420px; background: #FFFFFF; border-radius: 16px; overflow: hidden; border: 1px solid #E2E8F0; }
  .card-band { height: 6px; background: #2A7D8E; }
  .card-header { padding: 1.75rem 1.75rem 1.4rem; border-left: 4px solid #2A7D8E; }
  .card-initials { width: 56px; height: 56px; border-radius: 50%; background: #1B3560; display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 20px; color: #FFFFFF; margin-bottom: 1rem; }
  .card-name { font-family: 'DM Serif Display', serif; font-size: 2rem; color: #1B3560; line-height: 1.05; margin-bottom: 0.3rem; }
  .card-name em { color: #2A7D8E; font-style: italic; }
  .card-title { font-size: 0.72rem; color: #94A3B8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .card-tag { font-size: 0.7rem; padding: 0.25rem 0.7rem; background: #F0F9FA; color: #2A7D8E; border: 1px solid #C8E6EA; border-radius: 999px; }
  .card-divider { height: 1px; background: #F1F5F9; margin: 0 1.75rem; }
  .card-contact { padding: 0.6rem 1.25rem 1.4rem; display: flex; flex-direction: column; }
  .card-row { display: flex; align-items: center; gap: 0.85rem; padding: 0.85rem 0.5rem; border-bottom: 1px solid #F8FAFC; text-decoration: none; color: #334155; border-radius: 8px; transition: background 0.15s; }
  .card-row:last-child { border-bottom: none; }
  .card-row:active { background: #F8FAFC; }
  .card-icon-wrap { width: 38px; height: 38px; border-radius: 10px; background: #F0F9FA; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-row-text { display: flex; flex-direction: column; gap: 2px; overflow: hidden; flex: 1; }
  .card-row-label { font-size: 0.67rem; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.06em; }
  .card-row-value { font-size: 0.88rem; color: #1E293B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  a.card-row .card-row-value { color: #2A7D8E; }
  .card-row-arrow { color: #CBD5E1; font-size: 1.1rem; flex-shrink: 0; }
  .card-footer { padding: 0.85rem 1.75rem; background: #F8FAFC; border-top: 1px solid #F1F5F9; text-align: center; font-size: 0.68rem; color: #CBD5E1; letter-spacing: 0.05em; }
</style>
